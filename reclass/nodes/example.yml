classes:
  - service.docker-composition.hig
  - secret.nodes.example

parameters:

  setupify:

    sudo:
      linux.system: true
      linux.network: false
      linux.storage: false
    nosudo:
      docker-composition.hig: true
    formula:
      force_fetch: true
      force_reset: true
      sources:
        linux:
          address: https://github.com/salt-formulas/salt-formula-linux.git
          branch: master
        docker:
          address: https://github.com/salt-formulas/salt-formula-docker.git
          branch: master
        docker-composition:
          address: https://github.com/bbinet/salt-formula-docker-composition.git
          branch: master


  linux:

    system:
      enabled: true
      name: example
      #domain:
      timezone: Europe/Paris
      utc: true


  docker-composition:

    hig:
      compose:
        volumes:
          influxdb-data: {}
          grafana-data: {}
        services:
          influxdb:
            environment:
              INFLUXDB_ADMIN_PASSWORD: ${_param:_secret:influxdb_admin_password}
            volumes:
              - influxdb-data:/var/lib/influxdb
            ports:
              - "127.0.0.1:8086:8086"
          grafana:
            environment:
              GF_SECURITY_ADMIN_PASSWORD: ${_param:_secret:grafana_admin_password}
            volumes:
              - grafana-data:/var/lib/grafana
