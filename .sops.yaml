# SOPS configuration for automatic encryption of secrets in reclass/
#
# Setup:
#   1. Run `make sops_setup` to install sops + age and generate your key pair
#   2. The public key will be automatically added to this file
#   3. Run `make sops_install_hook` to install the pre-commit hook
#
# Only files under reclass/classes/secret/ are encrypted with SOPS.
# All other reclass files are plain YAML and committed as-is.
#
# All values and comments in secret files are encrypted by sops natively.
# Note: do NOT use encrypted_comment_regex here — despite its name it acts
# as a value-encryption filter and would leave most values in plaintext.
creation_rules:
  - path_regex: reclass/classes/secret/.*\.ya?ml$
    age: age1qqdlc94dwje03ky50arqwp27nk2da0w3avxc5kg29a7adsfwpssq5hy38u
